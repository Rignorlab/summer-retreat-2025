<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>First Summer Retreat 2025</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>
/* ─── MONLAM FONT ───────────────────── */
@font-face {
  font-family: 'Monlam';
  src: url('./font/MonlamUniOuChan2.ttf') format('truetype');
}

/* ─── ROOT ─────────────────────────── */
:root {
  --gold:#C9A84C;
  --deep:#0D0D0D;
  --card:#181818;
  --text:#E8E0D0;
  --muted:#7A7060;
}

/* ─── BASE ─────────────────────────── */
body{
  background:var(--deep);
  color:var(--text);
  font-family:'Cormorant Garamond',serif;
  padding:40px;
}

/* ─── TITLES ───────────────────────── */
.tibetan-title{
  font-family:'Monlam',serif;
  font-size:26px;
  color:#E8C97A;
  text-align:center;
}

.english-title{
  font-family:'Cinzel',serif;
  text-align:center;
  letter-spacing:3px;
}

/* ─── FORM ─────────────────────────── */
.form-card{
  background:var(--card);
  padding:30px;
  margin-top:30px;
}

.label-tibetan{
  font-family:'Monlam',serif;
  color:#E8C97A;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  background:#111;
  border:1px solid #333;
  color:white;
}

button{
  margin-top:20px;
  padding:12px 30px;
  border:1px solid var(--gold);
  background:none;
  color:#E8C97A;
  cursor:pointer;
}
</style>
</head>

<body>

<h2 class="tibetan-title">དབྱར་དུས་སྒོམ་སྒྲུབ།</h2>
<h1 class="english-title">First Summer Retreat 2025</h1>

<div class="form-card">

<form id="form">

<label class="label-tibetan">ཡིག་འཕྲིན།</label>
<input type="email" placeholder="Email" required>

<label class="label-tibetan">མིང་།</label>
<input type="text" placeholder="Name" required>

<label class="label-tibetan">སྐྱེས་ཚེས།</label>
<input type="date" required>

<label class="label-tibetan">འབྲེལ་གཏུག</label>
<input type="tel" placeholder="Phone" required>

<label class="label-tibetan">སྡོད་གནས།</label>
<textarea placeholder="Address"></textarea>

<button type="submit">Register</button>

</form>

</div>

<script>
document.getElementById('form').addEventListener('submit', function(e){
  e.preventDefault();
  alert('Submitted successfully!');
});
</script>

</body>
</html>
